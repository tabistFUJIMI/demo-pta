  <style>
    .content-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }
    .content-card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .content-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .content-card-img {
      position: relative;
      aspect-ratio: 4/3;
      overflow: hidden;
    }
    .content-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .content-card-body {
      padding: 20px;
    }
    .content-card-body h3 {
      margin: 0 0 8px;
      font-size: 18px;
    }
    .content-card-body p {
      margin: 0;
      font-size: 14px;
      color: #666;
      line-height: 1.6;
    }
    .content-card-meta {
      margin-top: 8px;
      font-size: 13px;
      color: #999;
    }
    @media (max-width: 600px) {
      .content-grid { grid-template-columns: 1fr; }
    }
  </style>

  <script src="js/reports-store.js" defer></script>
  <script src="js/main.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await ReportsStore.init();
      const grid = document.getElementById('reports-page-grid');
      const allReports = ReportsStore.getPublished();

      grid.innerHTML = allReports.map(r => {
        const date = r.date
          ? new Date(r.date).toLocaleDateString('ja-JP', { year:'numeric', month:'2-digit', day:'2-digit' }).replace(/\//g,'.')
          : new Date(r.createdAt).toLocaleDateString('ja-JP', { year:'numeric', month:'2-digit', day:'2-digit' }).replace(/\//g,'.');
        return `
          <div class="content-card">
            ${r.image ? `<div class="content-card-img"><img src="${r.image}" alt="${r.title}" loading="lazy"></div>` : ''}
            <div class="content-card-body">
              <h3>${r.title}</h3>
              <p>${r.body || r.description || ''}</p>
              <p class="content-card-meta">${date}</p>
            </div>
          </div>
        `;
      }).join('');

      if (allReports.length === 0) {
        grid.innerHTML = '<p style="color:#999;text-align:center;padding:40px 0;">現在活動報告はありません。</p>';
      }
    });
  </script>
</body>
