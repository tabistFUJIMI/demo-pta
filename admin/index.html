<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 | ふじみDXラボ小学校PTA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">
  <header class="admin-header">
    <h1>ふじみDXラボ小学校PTA 管理画面</h1>
    <div class="admin-header-right">
      <a href="../index.html" target="_blank">サイトを表示 ↗</a>
      <a href="#" id="logout-btn">ログアウト</a>
    </div>
  </header>

  <nav class="admin-sidebar">
    <a href="index.html" class="active">
      <span class="admin-sidebar-icon">&#128202;</span>ダッシュボード
    </a>
    <a href="news-edit.html">
      <span class="admin-sidebar-icon">&#128240;</span>お知らせ管理
    </a>
    <a href="events-edit.html">
      <span class="admin-sidebar-icon">&#128197;</span>年間行事管理
    </a>
    <a href="reports-edit.html">
      <span class="admin-sidebar-icon">&#128221;</span>活動報告管理
    </a>
  </nav>

  <main class="admin-main">
    <div class="admin-stats" id="admin-stats"></div>

    <div class="admin-card">
      <h2>最新のお知らせ</h2>
      <table class="admin-table">
        <thead>
          <tr><th>日付</th><th>タイトル</th><th>カテゴリ</th><th>ステータス</th><th></th></tr>
        </thead>
        <tbody id="recent-news"></tbody>
      </table>
    </div>

    <div class="admin-card">
      <h2>年間行事一覧</h2>
      <table class="admin-table">
        <thead>
          <tr><th>月</th><th>行事名</th><th>内容</th><th>ステータス</th><th></th></tr>
        </thead>
        <tbody id="recent-events"></tbody>
      </table>
    </div>

    <div class="admin-card">
      <h2>活動報告一覧</h2>
      <table class="admin-table">
        <thead>
          <tr><th>日付</th><th>タイトル</th><th>ステータス</th><th></th></tr>
        </thead>
        <tbody id="recent-reports"></tbody>
      </table>
    </div>
  </main>

  <script src="../js/news-store.js"></script>
  <script src="../js/events-store.js"></script>
  <script src="../js/reports-store.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    window.onAdminAuth = function () {
      const news = NewsStore.getAll();
      const events = EventsStore.getAll();
      const reports = ReportsStore.getAll();
      document.getElementById('admin-stats').innerHTML = `
        <div class="admin-stat"><div class="admin-stat-icon">&#128240;</div><div class="admin-stat-number">${news.length}</div><div class="admin-stat-label">お知らせ</div></div>
        <div class="admin-stat"><div class="admin-stat-icon">&#128197;</div><div class="admin-stat-number">${events.length}</div><div class="admin-stat-label">年間行事</div></div>
        <div class="admin-stat"><div class="admin-stat-icon">&#128221;</div><div class="admin-stat-number">${reports.length}</div><div class="admin-stat-label">活動報告</div></div>
      `;

      document.getElementById('recent-news').innerHTML = news.slice(0, 5).map(n => {
        const d = new Date(n.createdAt).toLocaleDateString('ja-JP');
        const st = n.status === 'published' ? '<span class="status-badge status-published">公開中</span>' : '<span class="status-badge status-draft">下書き</span>';
        return `<tr>
          <td>${d}</td><td>${n.title}</td><td>${n.category}</td><td>${st}</td>
          <td><a href="news-edit.html?id=${n.id}" style="color:#4A90A4;font-size:13px;font-weight:600;">編集</a></td>
        </tr>`;
      }).join('');

      document.getElementById('recent-events').innerHTML = events.map(e => {
        const st = e.status === 'published' ? '<span class="status-badge status-published">公開中</span>' : '<span class="status-badge status-draft">下書き</span>';
        return `<tr>
          <td>${e.month}</td><td>${e.name}</td><td>${e.description}</td><td>${st}</td>
          <td><a href="events-edit.html?id=${e.id}" style="color:#4A90A4;font-size:13px;font-weight:600;">編集</a></td>
        </tr>`;
      }).join('');

      document.getElementById('recent-reports').innerHTML = reports.map(r => {
        const st = r.status === 'published' ? '<span class="status-badge status-published">公開中</span>' : '<span class="status-badge status-draft">下書き</span>';
        return `<tr>
          <td>${r.date}</td><td>${r.title}</td><td>${st}</td>
          <td><a href="reports-edit.html?id=${r.id}" style="color:#4A90A4;font-size:13px;font-weight:600;">編集</a></td>
        </tr>`;
      }).join('');
    };

    document.getElementById('logout-btn').addEventListener('click', (e) => {
      e.preventDefault();
      sessionStorage.removeItem('admin_auth_hash');
      location.reload();
    });
  </script>
</body>
</html>
